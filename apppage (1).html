<!-- ========================================================
     🔧 SHEET_ID এখানে দিন (homepage.html এর মতো একই ID)
     ======================================================== -->
<script>
  const SHEET_ID = "1Z3-HRTo8VeZKafhlS3u9dq58IPoGLi0K6ecUBkyiW4w";

  // URL থেকে ?id= parameter নেওয়া
  function getAppId() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get("id")) || 1;
  }

  // Google Sheets থেকে নির্দিষ্ট app এর data আনা
  async function fetchApp(id) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    // id হলো row number (1-based)
    const row = rows[id - 1];
    if (!row) return null;

    return {
      id,
      name:        row.c[0]?.v || "App",
      description: row.c[1]?.v || "",
      icon:        row.c[2]?.v || "",
      version:     row.c[3]?.v || "",
      platform:    row.c[4]?.v || "",
      downloadUrl: row.c[5]?.v || "#",
      features:    row.c[6]?.v || "",  // comma দিয়ে আলাদা করুন, যেমন: "Offline,Free,Dark Mode"
    };
  }

  // Page টি app data দিয়ে fill করা
  function populatePage(app) {
    // Title update
    document.title = `${app.name} - AppDiscovery`;

    // Icon
    const iconEl = document.getElementById("app-icon");
    if (app.icon) {
      iconEl.innerHTML = `<img src="${app.icon}" alt="${app.name}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity duration-500" onerror="this.style.display='none'"/>`;
    } else {
      iconEl.innerHTML = `<span class="material-symbols-outlined text-outline" style="font-size:64px">android</span>`;
    }

    // Name & description
    document.getElementById("app-name").textContent = app.name;
    document.getElementById("app-desc").textContent = app.description;

    // Version & platform
    document.getElementById("app-meta").textContent = `${app.version ? "v" + app.version : ""} ${app.platform ? "• " + app.platform : ""}`.trim();

    // Download button — Terabox / যেকোনো link কাজ করবে
    const dlBtn = document.getElementById("download-btn");
    if (app.downloadUrl && app.downloadUrl !== "#") {
      dlBtn.href = app.downloadUrl;
      dlBtn.target = "_blank";           // নতুন tab এ খুলবে
      dlBtn.rel = "noopener noreferrer";
    } else {
      dlBtn.classList.add("opacity-50", "pointer-events-none");
      dlBtn.querySelector("#btn-text").textContent = "Coming Soon";
    }

    // Feature chips
    const featuresEl = document.getElementById("feature-chips");
    if (app.features) {
      const chips = app.features.split(",").map(f => f.trim()).filter(Boolean);
      featuresEl.innerHTML = chips.map(f =>
        `<span class="bg-surface-container-high text-on-surface-variant font-label-sm text-label-sm px-4 py-2 rounded-full border border-white/5">${f}</span>`
      ).join("");
    }

    // Loading skeleton সরিয়ে content দেখানো
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
  }

  function showError(msg) {
    document.getElementById("loading").innerHTML = `
      <div class="text-center py-20 text-on-surface-variant">
        <span class="material-symbols-outlined text-6xl mb-4 block text-outline">error_outline</span>
        <p class="font-body-md">${msg}</p>
        <a href="index.html" class="mt-6 inline-block text-primary underline font-label-md">← ফিরে যান</a>
      </div>`;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    if (SHEET_ID === "YOUR_GOOGLE_SHEET_ID_HERE") {
      showError("⚠️ SHEET_ID এখনো set করা হয়নি।");
      return;
    }

    try {
      const appId = getAppId();
      const app = await fetchApp(appId);
      if (!app) { showError("App পাওয়া যায়নি।"); return; }
      populatePage(app);
    } catch (err) {
      console.error(err);
      showError("Data লোড হয়নি। Sheet টি Public কিনা চেক করুন।");
    }
  });
</script>
